# Crown Mural - Cloudflare Pages + Durable Objects Configuration
# Generated by Wrangler on Fri Jan 09 2026 17:46:24 GMT-0500 (Eastern Standard Time)
# UPDATED: Added main entry point for worker

name = "wistyrea"
main = "worker.ts"  # ADDED: Entry point for Durable Object worker
pages_build_output_dir = "dist"
compatibility_date = "2025-09-04"
compatibility_flags = ["experimental", "webgpu"]

[vars]
NODE_VERSION = "20"
PYTHON_VERSION = "3.10"

# Binding for stateful Durable Object that handles mural data
# NOTE: SQLite-backed DOs ARE supported on free tier as of late 2024
[[durable_objects.bindings]]
name = "MURAL_STATE"
class_name = "MuralStateObject"

[[migrations]]
tag = "v1"  # Unique identifier for this migration version
new_sqlite_classes = ["MuralStateObject"]  # SQLite backend (recommended, free tier compatible)

# Production environment
[env.production.vars]
NODE_VERSION = "20"
PYTHON_VERSION = "3.10"

[[env.production.durable_objects.bindings]]
name = "MURAL_STATE"
class_name = "MuralStateObject"

# IMPORTANT: If using Cloudflare Pages with Functions:
# 1. The worker.ts handles ONLY /api/* routes
# 2. Static assets in /dist are served automatically by Pages
# 3. For pure Workers deployment, add asset serving to worker.ts

# If you DON'T need Durable Objects (purely client-side app):
# 1. Remove this wrangler.toml entirely
# 2. Deploy to Pages without worker
# 3. The app works 100% client-side with WebGPU
