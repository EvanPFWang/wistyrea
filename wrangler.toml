# Crown Mural - Cloudflare Pages Configuration
# Durable Objects live in the sidecar worker (worker/wrangler.toml).

name = "wistyrea"
pages_build_output_dir = "dist"
compatibility_date = "2025-09-04"

[vars]
NODE_VERSION = "20"
PYTHON_VERSION = "3.10"

# Remote binding — Pages talks to the sidecar worker for DO access
[[durable_objects.bindings]]
name = "MURAL_STATE"
class_name = "MuralStateObject"
script_name = "wistyrea-backend"

# Production environment
[env.production.vars]
NODE_VERSION = "20"
PYTHON_VERSION = "3.10"

[[env.production.durable_objects.bindings]]
name = "MURAL_STATE"
class_name = "MuralStateObject"
script_name = "wistyrea-backend"
